services:
  postgres:
    image: postgres:16-alpine
    container_name: sb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sports_booking
    ports:
      - "5432:5432"
    volumes:
      - sb_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sb_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sb_redis:/data

  minio:
    image: minio/minio:latest
    container_name: sb_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sb_minio:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sb_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  sb_pg:
  sb_redis:
  sb_minio:
