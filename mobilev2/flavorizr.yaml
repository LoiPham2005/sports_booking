# ════════════════════════════════════════════════════════════════
# flutter_flavorizr config — sinh native code cho 3 flavors.
#
# ⚠️ FLAVORIZR KHÔNG IDEMPOTENT — chạy `make gen-flavor` nhiều lần sẽ
# OVERWRITE: lib/app.dart, ios/Runner/Info.plist, build.gradle.kts...
#
# 📋 Workflow:
#   - Setup lần đầu (mới clone repo): chạy `make gen-flavor` 1 lần để gen
#     productFlavors (Android) + xcconfigs/schemes (iOS).
#     Sau đó CUSTOMIZE lib/app.dart, Info.plist, build.gradle.kts cho dự án.
#
#   - Firebase configs: đặt THẲNG vào vị trí native (KHÔNG dùng flavorizr
#     google:firebase processor — quá phức tạp, dễ gây lỗi):
#       android/app/src/dev/google-services.json
#       android/app/src/stg/google-services.json
#       android/app/src/prod/google-services.json
#       ios/Runner/dev/GoogleService-Info.plist
#       ios/Runner/stg/GoogleService-Info.plist
#       ios/Runner/prod/GoogleService-Info.plist
#     (iOS plist đã được add vào Xcode project + build phase chọn theo
#      scheme tự động.)
#
# 📌 Sau setup ban đầu, bạn KHÔNG cần chạy `make gen-flavor` nữa.
# ════════════════════════════════════════════════════════════════

app:
  android:
    flavorDimensions: "flavor-type"
  ios:
    buildSettings:
      ENABLE_BITCODE: NO

flavors:
  dev:
    app:
      name: "AppDev"
    android:
      applicationId: "com.flutter.base.dev"
    ios:
      bundleId: "com.flutter.base.dev"
    icon: "assets/images/dev.png"

  stg:
    app:
      name: "AppStg"
    android:
      applicationId: "com.flutter.base.stg"
    ios:
      bundleId: "com.flutter.base.stg"
    icon: "assets/images/stg.png"

  prod:
    app:
      name: "App"
    android:
      applicationId: "com.flutter.base"
    ios:
      bundleId: "com.flutter.base"
    icon: "assets/images/prod.png"
